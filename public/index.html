<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ربط بوت فارس</title>
    <style>
        body { background: #16161e; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1c1c27; padding: 30px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin: 20px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 18px; }
        button { width: 100%; padding: 15px; background: #2ecc71; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #result { margin-top: 20px; font-size: 24px; font-weight: bold; color: #f1c40f; letter-spacing: 5px; }
        .error { color: #e74c3c !important; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ربط الرقم</h2>
        <p>أدخل الرقم بالصيغة الدولية (بدون +)</p>
        <input type="text" id="number" placeholder="مثال: 967773987296">
        <button id="btn" onclick="getPairingCode()">احصل على الكود</button>
        <div id="result"></div>
    </div>

    <script>
        async function getPairingCode() {
            const num = document.getElementById('number').value;
            const resDiv = document.getElementById('result');
            const btn = document.getElementById('btn');

            if (!num) return alert("يرجى إدخال الرقم");

            resDiv.innerHTML = "جاري الطلب... ⏳";
            resDiv.className = "";
            btn.disabled = true;

            try {
                const response = await fetch(`/pairing-code?number=${num}`);
                const data = await response.json();

                if (data.code) {
                    resDiv.innerHTML = data.code; // عرض الكود (8 رموز)
                } else {
                    resDiv.innerHTML = data.error || "خطأ!";
                    resDiv.className = "error";
                }
            } catch (e) {
                resDiv.innerHTML = "فشل الاتصال بالسيرفر";
                resDiv.className = "error";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
