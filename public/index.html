<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fares-Bot Pairing</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111827;
      --card: #1f2937;
      --muted: #9ca3af;
      --text: #f9fafb;
      --accent: #25d366;
      --accent-hover: #1ebc59;
      --danger: #ef4444;
      --border: rgba(255,255,255,0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #1f2937 0%, var(--bg) 55%);
      font-family: Tahoma, Arial, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(100%, 430px);
      background: rgba(31, 41, 55, 0.94);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 10px;
      color: var(--accent);
      text-align: center;
      font-size: 28px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.7;
      font-size: 15px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #d1d5db;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.9);
      color: var(--text);
      border-radius: 12px;
      padding: 14px 16px;
      text-align: left;
      direction: ltr;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    input:focus {
      border-color: rgba(37, 211, 102, 0.65);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      margin-top: 14px;
      border: none;
      background: var(--accent);
      color: #08130d;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    button:hover { background: var(--accent-hover); }
    button:active { transform: scale(0.99); }
    button:disabled { opacity: 0.75; cursor: wait; }

    .result {
      margin-top: 18px;
      padding: 14px;
      min-height: 60px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.75);
      display: grid;
      place-items: center;
      text-align: center;
      line-height: 1.7;
    }

    .code {
      color: var(--accent);
      font-weight: 800;
      font-size: 28px;
      letter-spacing: 3px;
      direction: ltr;
    }

    .error {
      color: #fecaca;
      background: rgba(127, 29, 29, 0.25);
      border-color: rgba(239, 68, 68, 0.35);
    }

    .muted {
      color: var(--muted);
      font-size: 14px;
    }

    .hint {
      margin-top: 12px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fares-Bot Pairing</h1>
    <p>أدخل رقم واتساب بصيغة دولية بدون علامة + للحصول على كود الاقتران.</p>

    <label for="phone">رقم الهاتف</label>
    <input id="phone" type="text" placeholder="مثال: 201001234567" inputmode="numeric" />

    <button id="pairBtn" onclick="getCode()">احصل على الكود</button>

    <div id="result" class="result">
      <span class="muted">الكود سيظهر هنا</span>
    </div>

    <div class="hint">مثال صحيح: 201001234567 أو 967770000000</div>
  </div>

  <script>
    const phoneInput = document.getElementById('phone');
    const pairBtn = document.getElementById('pairBtn');
    const result = document.getElementById('result');

    phoneInput.addEventListener('input', () => {
      phoneInput.value = phoneInput.value.replace(/\D/g, '');
    });

    function setResult(html, isError = false) {
      result.className = isError ? 'result error' : 'result';
      result.innerHTML = html;
    }

    async function getCode() {
      const number = phoneInput.value.trim().replace(/\D/g, '');

      if (!number) {
        setResult('أدخل الرقم أولاً', true);
        return;
      }

      pairBtn.disabled = true;
      setResult('<span class="muted">جاري إنشاء كود الاقتران...</span>');

      try {
        const response = await fetch(`/api/pairing?number=${encodeURIComponent(number)}`);
        const data = await response.json();

        if (!response.ok || !data.status) {
          throw new Error(data.message || 'حدث خطأ غير متوقع');
        }

        setResult(`<span class="code">${data.pairing_code}</span>`);
      } catch (error) {
        setResult(error.message || 'فشل الاتصال بالسيرفر', true);
      } finally {
        pairBtn.disabled = false;
      }
    }
  </script>
</body>
</html>
