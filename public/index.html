<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOLDEN QUEEN | CONNECT</title>
    <style>
        :root { --gold: #d4a017; --bg: #0b0b10; --card: #16161e; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .panel { background: var(--card); width: 90%; max-width: 400px; padding: 40px 20px; border-radius: 30px; border: 1px solid rgba(212,160,23,0.3); text-align: center; box-shadow: 0 15px 45px rgba(0,0,0,0.8); }
        .logo { font-size: 60px; margin-bottom: 10px; }
        .lang-btn { width: 100%; padding: 16px; margin: 12px 0; border-radius: 15px; border: 1px solid #333; background: #1a1a24; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 16px; transition: 0.3s; }
        .lang-btn:hover { border-color: var(--gold); background: #222; }
        input { width: 100%; padding: 18px; margin: 20px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 22px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 18px; background: var(--gold); border: none; border-radius: 15px; color: #000; font-weight: bold; cursor: pointer; font-size: 18px; }
        #pairing-display { margin-top: 25px; font-size: 32px; color: var(--gold); font-weight: bold; letter-spacing: 5px; }
        .hidden { display: none; }
        .pass-hint { margin-top: 15px; color: #2ecc71; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="panel" id="step1">
        <div class="logo">👑</div>
        <h2 style="color: var(--gold);">إختر اللغة</h2>
        <p style="color: #666; font-size: 12px; margin-bottom: 20px;">CHOOSE YOUR LANGUAGE</p>
        
        <button class="lang-btn" onclick="next('ar')"><span>العربية</span> <span>🇾🇪</span></button>
        <button class="lang-btn" onclick="next('en')"><span>English</span> <span>🇺🇸</span></button>
        <button class="lang-btn" onclick="next('pt')"><span>Português</span> <span>🇧🇷</span></button>
    </div>

    <div class="panel hidden" id="step2">
        <div class="logo">👑</div>
        <h1 id="title">ربط الرقم</h1>
        <p id="subtitle" style="color: #888; font-size: 12px;">أدخل رقمك مع رمز الدولة بدون (+)</p>
        
        <input type="text" id="phone" placeholder="967773987296">
        <button class="btn-main" id="getBtn" onclick="getCode()">احصل على الكود</button>
        
        <div id="pairing-display"></div>
        <div id="pass-display" class="pass-hint"></div>
    </div>

    <script>
        function next(lang) {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            if(lang === 'en') {
                document.getElementById('title').innerText = "Link Device";
                document.getElementById('subtitle').innerText = "Enter number with country code";
                document.getElementById('getBtn').innerText = "GET CODE";
            }
        }

        async function getCode() {
            const num = document.getElementById('phone').value;
            const resBox = document.getElementById('pairing-display');
            const passBox = document.getElementById('pass-display');
            const btn = document.getElementById('getBtn');

            if(!num) return alert("Please enter your number");

            resBox.innerText = "⏳...";
            btn.disabled = true;

            try {
                const response = await fetch(`/get-pairing?number=${num}`);
                const data = await response.json();

                if(data.code) {
                    resBox.innerText = data.code;
                    passBox.innerText = "🔐 كلمة سر الموقع: " + data.pass;
                } else {
                    resBox.innerText = "Error!";
                    resBox.style.color = "red";
                }
            } catch (e) {
                resBox.innerText = "Server Error!";
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
