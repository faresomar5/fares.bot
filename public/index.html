<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 بوت الملك فارس</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #0d0d12;
            --card: #1a1a27;
            --gold: #d4a055;
            --text: #f0eaf5;
            --muted: #8a849a;
            --border-accent: rgba(212,160,85,0.35);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container { max-width: 440px; width: 90%; margin-top: 50px; }
        .card {
            background: var(--card);
            border: 1px solid var(--border-accent);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            text-align: center;
        }
        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, var(--gold), #b8853a);
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        header h1 { margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        footer { margin-top: auto; padding: 20px; color: var(--muted); font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <header style="text-align: center; margin-bottom: 30px;">
            <h1>👑 بوت الملك <span style="color: var(--gold);">فارس</span></h1>
            <p style="color: var(--muted);">بوابة ربط الأجهزة الآمنة</p>
        </header>

        <div class="card">
            <label>أدخل رقم الواتساب مع رمز الدولة</label>
            <input type="text" id="phoneNum" placeholder="967XXXXXXXX">
            <button class="btn" onclick="getPairingCode()">الحصول على كود الربط</button>
        </div>
    </div>

    <footer>
        <p>© 2026 بوت الملك فارس - جميع الحقوق محفوظة</p>
    </footer>

    <script>
        // الرابط الذي طلبته
        const API_BASE = "https://fares-bot-eahg.onrender.com";

        async function getPairingCode() {
            const num = document.getElementById('phoneNum').value.replace(/\D/g, '');
            if (!num) return Swal.fire('خطأ', 'يرجى إدخال الرقم أولاً', 'error');

            Swal.fire({ title: 'جاري استخراج الكود...', didOpen: () => Swal.showLoading() });

            try {
                const response = await fetch(`${API_BASE}/api/pairing`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ num })
                });
                const data = await response.json();

                if (data.code) {
                    Swal.fire({
                        title: 'كود الربط الخاص بك',
                        html: `<h1 style="color:#d4a055; font-size: 3rem;">${data.code}</h1>`,
                        icon: 'success'
                    });
                } else {
                    throw new Error(data.error || 'حدث خطأ ما');
                }
            } catch (error) {
                Swal.fire('فشل', error.message, 'error');
            }
        }
    </script>
</body>
</html>
