<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOLDEN QUEEN | CONTROL PANEL</title>
  <style>
    :root {
      --bg: #020617; --panel: #0f172a; --accent: #22c55e; --gold: #d4a017;
      --text: #f8fafc; --muted: #94a3b8; --border: #1e293b;
    }
    body {
      margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg); color: var(--text); overflow-x: hidden;
    }
    /* واجهة الدخول */
    #login-screen {
      height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      background: var(--panel); padding: 40px; border-radius: 24px;
      border: 1px solid var(--border); width: 100%; max-width: 400px; text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .login-box h2 { color: var(--gold); margin-bottom: 20px; }
    input {
      width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px;
      border: 1px solid var(--border); background: #020617; color: white; text-align: center;
    }
    .btn-main {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      background: linear-gradient(45deg, var(--gold), #f9d976);
      color: #000; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    /* واجهة التحكم */
    #dashboard { display: none; padding: 20px; max-width: 1100px; margin: 0 auto; }
    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 20px; padding: 20px; margin-bottom: 20px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .setting-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; border-bottom: 1px solid #1e293b;
    }
    .switch {
      position: relative; display: inline-block; width: 46px; height: 24px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
      background: #334155; transition: .4s; border-radius: 24px;
    }
    .slider:before {
      position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px;
      background: white; transition: .4s; border-radius: 50%;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(22px); }
    .section-title { color: var(--gold); font-weight: bold; margin-bottom: 15px; display: block; }
  </style>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <div style="font-size: 40px; margin-bottom: 10px;">👑</div>
      <h2>دخول المشرف</h2>
      <input type="text" id="user-number" placeholder="رقم المالك (967...)">
      <input type="password" id="user-pass" placeholder="كلمة المرور 🔐">
      <button class="btn-main" onclick="handleLogin()">تسجيل الدخول</button>
    </div>
  </div>

  <div id="dashboard">
    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--gold);">GOLDEN QUEEN SETTINGS</h1>
        <p style="color: var(--muted);">تحكم في كافة خصائص البوت من مكان واحد</p>
    </header>

    <div class="grid">
        <div class="card">
            <span class="section-title">الأمان والخصوصية</span>
            <div class="setting-item">
                <span>متصل دائماً (Online)</span>
                <label class="switch"><input type="checkbox" id="alwaysOnline"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <span>مكافحة الحذف (Anti-Delete)</span>
                <label class="switch"><input type="checkbox" id="antiDelete"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <span>مكافحة الروابط (Anti-Link)</span>
                <label class="switch"><input type="checkbox" id="antiLink"><span class="slider"></span></label>
            </div>
        </div>

        <div class="card">
            <span class="section-title">التفاعل والأتمتة</span>
            <div class="setting-item">
                <span>قراءة الحالات</span>
                <label class="switch"><input type="checkbox" id="autoStatusRead"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <span>تفاعل الحالات</span>
                <label class="switch"><input type="checkbox" id="autoStatusReact"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <span>روبوت المحادثة (ChatBot)</span>
                <label class="switch"><input type="checkbox" id="chatBot"><span class="slider"></span></label>
            </div>
        </div>
    </div>

    <div class="card" style="text-align: center;">
        <button class="btn-main" style="max-width: 300px;" onclick="handleSave()">حفظ جميع الإعدادات ✅</button>
    </div>
  </div>

  <script>
    async function handleLogin() {
      const number = document.getElementById('user-number').value;
      const password = document.getElementById('user-pass').value;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ number, password })
      });

      const data = await res.json();
      if(data.success) {
        localStorage.setItem('phone', number);
        localStorage.setItem('pass', password);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        // تعبئة البيانات إذا كانت موجودة
        if(data.settings) fillSettings(data.settings);
      } else {
        alert(data.message);
      }
    }

    function fillSettings(s) {
        document.getElementById('alwaysOnline').checked = s.alwaysOnline === true;
        document.getElementById('antiDelete').checked = s.antiDelete === true;
        document.getElementById('antiLink').checked = s.antiLink === true;
        document.getElementById('autoStatusRead').checked = s.autoStatusRead === true;
        document.getElementById('autoStatusReact').checked = s.autoStatusReact === true;
        document.getElementById('chatBot').checked = s.chatBot === true;
    }

    async function handleSave() {
        const settings = {
            alwaysOnline: document.getElementById('alwaysOnline').checked,
            antiDelete: document.getElementById('antiDelete').checked,
            antiLink: document.getElementById('antiLink').checked,
            autoStatusRead: document.getElementById('autoStatusRead').checked,
            autoStatusReact: document.getElementById('autoStatusReact').checked,
            chatBot: document.getElementById('chatBot').checked
        };

        const res = await fetch('/api/settings/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                number: localStorage.getItem('phone'),
                password: localStorage.getItem('pass'),
                settings
            })
        });

        const data = await res.json();
        if(data.success) alert("تم الحفظ بنجاح ✅");
    }
  </script>
</body>
</html>
