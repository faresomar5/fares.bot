<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>إعدادات بوت فارس</title>
    <style>
        :root { --gold: #d4a017; --bg: #0d0d12; --card: #16161e; }
        body { background: var(--bg); color: white; font-family: sans-serif; direction: rtl; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); width: 90%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box" id="login">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="num" placeholder="الرقم المربوط">
        <input type="password" id="pass" placeholder="كلمة السر">
        <button class="btn" onclick="login()">دخول</button>
    </div>
    <div class="box" id="panel" style="display:none;">
        <h2 style="color:var(--gold);">لوحة التحكم</h2>
        <p>مرحباً بك في إعدادات بوت فارس</p>
        <button class="btn" onclick="alert('تم الحفظ')">حفظ الإعدادات</button>
    </div>
    <script>
        function login() {
            if(document.getElementById('pass').value === 'Fares-9900') {
                document.getElementById('login').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            } else { alert('كلمة السر خطأ'); }
        }
    </script>
</body>
</html>
