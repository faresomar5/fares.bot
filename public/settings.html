<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم فارس بوت</title>
    <style>
        :root { --gold: #d4a017; --bg: #0d0d12; --card: #16161e; --text: #f0eaf5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: var(--card); width: 100%; max-width: 500px; padding: 25px; border-radius: 20px; border: 1px solid var(--gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { text-align: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; background: #0a0a0f; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .setting-info h4 { margin: 0; color: var(--gold); font-size: 16px; }
        .setting-info p { margin: 5px 0 0; font-size: 12px; color: #888; }
        
        /* Switch Toggle Style */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(24px); }
        
        .save-btn { width: 100%; padding: 15px; background: var(--gold); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 style="color: var(--gold); margin: 0;">FARES BOT PANEL</h2>
            <p style="font-size: 13px; color: #888;">إدارة إعدادات البوت الخاصة بك</p>
        </div>

        <div id="settings-list">
            </div>

        <button class="save-btn" onclick="saveToBackend()">حفظ كافة التغييرات</button>
    </div>

    <script>
        // مصفوفة الإعدادات
        let settings = {
            antiLink: false,
            antiCall: true,
            autoRead: true,
            autoReact: true,
            alwaysOnline: true,
            publicMode: true
        };

        // عرض الإعدادات في الواجهة
        function renderSettings() {
            const list = document.getElementById('settings-list');
            list.innerHTML = '';
            const names = {
                antiLink: ["منع الروابط", "حذف الروابط تلقائياً"],
                antiCall: ["منع المكالمات", "رفض المكالمات الواردة"],
                autoRead: ["قراءة الحالات", "مشاهدة الحالات تلقائياً"],
                autoReact: ["تفاعل الحالات", "إضافة قلب للحالات"],
                alwaysOnline: ["متصل دائماً", "إظهار البوت أونلاين"],
                publicMode: ["الوضع العام", "البوت يستجيب للجميع"]
            };

            for (let key in settings) {
                list.innerHTML += `
                    <div class="setting-item">
                        <div class="setting-info">
                            <h4>${names[key][0]}</h4>
                            <p>${names[key][1]}</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="${key}" ${settings[key] ? 'checked' : ''} onchange="updateVal('${key}')">
                            <span class="slider"></span>
                        </label>
                    </div>`;
            }
        }

        function updateVal(key) {
            settings[key] = document.getElementById(key).checked;
        }

        async function saveToBackend() {
            // هنا نقوم بإرسال الإعدادات للسيرفر ليحفظها في ملف JSON
            alert("تم الحفظ بنجاح ✅");
            // ملاحظة: يمكنك ربطها بـ API السيرفر لاحقاً
        }

        renderSettings();
    </script>
</body>
</html>
