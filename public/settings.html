<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Queen Dashboard - Fares</title>
    <style>
        :root { --gold-grad: linear-gradient(135deg, #d4a017 0%, #f9d976 100%); --bg: #0b0b10; --card: rgba(22, 22, 30, 0.95); }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .glass-panel { background: var(--card); width: 90%; max-width: 450px; padding: 30px; border-radius: 25px; border: 1px solid rgba(212, 160, 23, 0.3); box-shadow: 0 15px 35px rgba(0,0,0,0.7); backdrop-filter: blur(10px); text-align: center; }
        .logo-area { margin-bottom: 25px; }
        .logo-area img { width: 80px; border-radius: 50%; border: 2px solid #d4a017; padding: 5px; }
        h1 { font-size: 24px; letter-spacing: 2px; margin: 10px 0; background: var(--gold-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 15px 45px; background: rgba(0,0,0,0.3); border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-login { width: 100%; padding: 16px; background: var(--gold-grad); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; font-size: 17px; box-shadow: 0 5px 15px rgba(212, 160, 23, 0.4); }
        .settings-area { display: none; text-align: right; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        .emoji-input { width: 60px; background: #000; border: 1px solid #d4a017; color: white; text-align: center; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div id="login-section">
            <div class="logo-area">
                <img src="https://i.ibb.co/L6S0GzZ/fares.jpg" alt="Logo">
                <h1>GOLDEN QUEEN</h1>
                <p style="color: #888; font-size: 12px;">CONTACT SAVE ADMIN 🔐</p>
            </div>
            <div class="input-group">
                <input type="text" id="phone" placeholder="رقم المالك 📞">
            </div>
            <div class="input-group">
                <input type="password" id="pass" placeholder="كلمة المرور 🔑">
            </div>
            <p style="font-size: 11px; color: #666;">💡 نسيت كلمة المرور؟ أرسل .settings في محادثة المالك</p>
            <button class="btn-login" onclick="attemptLogin()">تسجيل الدخول</button>
        </div>

        <div id="settings-section" class="settings-area">
            <h2 style="color: #d4a017;">إعداداتك الخاصة</h2>
            <div class="setting-row">
                <span>تغيير إيموجي التفاعل</span>
                <input type="text" id="emojiVal" class="emoji-input" placeholder="❤️">
            </div>
            <div class="setting-row">
                <span>منع المكالمات</span>
                <input type="checkbox" checked>
            </div>
            <div class="setting-row">
                <span>الوضع العام</span>
                <input type="checkbox" checked>
            </div>
            <button class="btn-login" style="margin-top: 20px;" onclick="saveSettings()">حفظ التعديلات</button>
        </div>
    </div>

    <script>
        function attemptLogin() {
            // سيتم هنا التحقق من السيرفر، حالياً تجريبي:
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('settings-section').style.display = 'block';
        }
        function saveSettings() {
            const emoji = document.getElementById('emojiVal').value;
            alert('تم حفظ الإيموجي الجديد: ' + emoji);
        }
    </script>
</body>
</html>
