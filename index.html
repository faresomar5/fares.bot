<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فارس بوت - Fares Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #0d0d12;
            --card: #16161e;
            --gold: #d4a017;
            --text: #f0eaf5;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e, #0d0d12);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: var(--card);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(212, 160, 23, 0.3);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* واجهة اختيار اللغة */
        #language-selection {
            display: block;
        }
        .lang-btn {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid var(--gold);
            background: transparent;
            color: var(--gold);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .lang-btn:hover {
            background: var(--gold);
            color: #000;
        }

        /* واجهة الاقتران */
        #pairing-interface {
            display: none;
        }
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); margin-bottom: 10px; }
        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #0a0a0f;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), #b38644);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }
        #result-container {
            margin-top: 30px;
            display: none;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .code-display {
            font-family: monospace;
            font-size: 2.2rem;
            color: #fff;
            background: #222;
            padding: 10px;
            border-radius: 10px;
            border: 1px dashed var(--gold);
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="language-selection">
            <h1 style="font-size: 1.5rem;">CHOOSE LANGUAGE / اختر اللغة</h1>
            <button class="lang-btn" onclick="showInterface('ar')">العربية</button>
            <button class="lang-btn" onclick="showInterface('en')">English</button>
        </div>

        <div id="pairing-interface">
            <h1 id="title">👑 سيرفر فارس</h1>
            <p id="desc">بوابة ربط الأجهزة المتقدمة لواتساب</p>
            
            <input type="text" id="phoneNumber" placeholder="967777777777">
            <button class="submit-btn" id="btn-text" onclick="getPairingCode()">إنشاء كود الاقتران</button>
            
            <div id="result-container">
                <div id="code-label" style="color: #888; font-size: 0.9rem;">كود الاقتران الخاص بك:</div>
                <div class="code-display" id="pairingCode">--------</div>
                <p id="instructions" style="margin-top: 15px; font-size: 0.8rem; color: var(--gold);">
                    افتح واتساب > الأجهزة المرتبطة > ربط جهاز > الربط برقم الهاتف وأدخل الكود.
                </p>
            </div>
        </div>
    </div>

    <script>
        let currentLang = 'ar';

        function showInterface(lang) {
            currentLang = lang;
            document.getElementById('language-selection').style.display = 'none';
            document.getElementById('pairing-interface').style.display = 'block';

            if (lang === 'en') {
                document.getElementById('title').innerText = "FARES SERVER";
                document.getElementById('desc').innerText = "Advanced WhatsApp Pairing Gateway";
                document.getElementById('phoneNumber').placeholder = "e.g. 967777777777";
                document.getElementById('btn-text').innerText = "Generate Pairing Code";
                document.getElementById('code-label').innerText = "Your Pairing Code:";
                document.getElementById('instructions').innerText = "Open WhatsApp > Linked Devices > Link a Device > Link with phone number instead.";
            }
        }

        async function getPairingCode() {
            const number = document.getElementById('phoneNumber').value.trim();
            const resultContainer = document.getElementById('result-container');
            const codeDisplay = document.getElementById('pairingCode');
            
            if (!number) {
                const msg = currentLang === 'ar' ? 'يرجى إدخال رقم الهاتف' : 'Please enter phone number';
                Swal.fire(currentLang === 'ar' ? 'تنبيه' : 'Warning', msg, 'warning');
                return;
            }

            Swal.fire({
                title: currentLang === 'ar' ? 'جاري الطلب...' : 'Processing...',
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch(`https://fares-bot-eahg.onrender.com/api/pairing?number=${number}`);
                const data = await response.json();
                Swal.close();

                if (data.status && data.pairing_code) {
                    codeDisplay.innerText = data.pairing_code;
                    resultContainer.style.display = 'block';
                    Swal.fire(currentLang === 'ar' ? 'تم نجاح' : 'Success', '', 'success');
                } else {
                    Swal.fire('Error', data.message || 'Try again', 'error');
                }
            } catch (error) {
                Swal.close();
                Swal.fire('Error', 'Check server status', 'error');
            }
        }
    </script>
</body>
</html>
