<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فارس بوت - نظام الاقتران الملكي</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #0d0d12;
            --card: #16161e;
            --gold: #d4a017;
            --gold-light: #f1c40f;
            --text: #f0eaf5;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% -20%, #1a1a2e, #0d0d12);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: var(--card);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid rgba(212, 160, 23, 0.3);
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 2rem;
            margin-bottom: 10px;
        }
        p { color: #aaa; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #0a0a0f;
            color: white;
            font-size: 1.1rem;
            text-align: center;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold), #b38644);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212, 160, 23, 0.4); }
        #result-container {
            margin-top: 30px;
            display: none;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .code-display {
            font-family: monospace;
            font-size: 2.2rem;
            color: #fff;
            background: #222;
            padding: 10px;
            border-radius: 10px;
            border: 1px dashed var(--gold);
            margin-top: 10px;
            display: inline-block;
            letter-spacing: 4px;
        }
        .footer { margin-top: 40px; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <h1>👑 سيرفر فارس</h1>
        <p>بوابة ربط الأجهزة المتقدمة لواتساب</p>
        
        <input type="text" id="phoneNumber" placeholder="مثال: 967777777777">
        <button onclick="getPairingCode()">إنشاء كود الاقتران</button>
        
        <div id="result-container">
            <div style="color: #888; font-size: 0.9rem;">كود الاقتران الخاص بك:</div>
            <div class="code-display" id="pairingCode">--------</div>
            <p style="margin-top: 15px; font-size: 0.8rem; color: var(--gold-light);">
                افتح واتساب > الأجهزة المرتبطة > ربط جهاز > الربط برقم الهاتف وأدخل الكود.
            </p>
        </div>
    </div>

    <div class="footer">© 2026 FARES BOT</div>

    <script>
        async function getPairingCode() {
            const number = document.getElementById('phoneNumber').value.trim();
            const resultContainer = document.getElementById('result-container');
            const codeDisplay = document.getElementById('pairingCode');
            
            if (!number) {
                Swal.fire('تنبيه', 'يرجى إدخال رقم الهاتف أولاً', 'warning');
                return;
            }

            Swal.fire({
                title: 'جاري الطلب...',
                text: 'يرجى الانتظار ثواني لتوليد الكود',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch(`https://fares-bot-eahg.onrender.com/api/pairing?number=${number}`);
                const data = await response.json();
                Swal.close();

                if (data.status && data.pairing_code) {
                    codeDisplay.innerText = data.pairing_code;
                    resultContainer.style.display = 'block';
                    Swal.fire('تم بنجاح', 'وصل الكود! أدخله في واتساب الآن', 'success');
                } else {
                    Swal.fire('فشل', data.message || 'حاول مرة أخرى', 'error');
                }
            } catch (error) {
                Swal.close();
                Swal.fire('خطأ', 'تأكد أن السيرفر يعمل (Live) في Render', 'error');
            }
        }
    </script>
</body>
</html>
