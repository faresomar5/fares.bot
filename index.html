<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فارس بوت - كود الاقتران</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg: #0d0d12;
            --card: #1a1a27;
            --gold: #d4a055;
            --text: #f0eaf5;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        input {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 1rem;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            border: none;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        #result {
            margin-top: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>👑 فارس بوت</h2>
        <p>أدخل رقمك مع رمز الدولة للحصول على كود الاقتران</p>
        
        <input type="text" id="phoneNumber" placeholder="مثال: 967777777777">
        <button onclick="getPairingCode()">الحصول على الكود</button>
        
        <div id="result"></div>
    </div>

    <script>
        async function getPairingCode() {
            const number = document.getElementById('phoneNumber').value;
            const resultDiv = document.getElementById('result');
            
            if (!number) {
                Swal.fire('خطأ', 'يرجى إدخال رقم الهاتف', 'error');
                return;
            }

            resultDiv.innerHTML = "جاري التحميل...";

            try {
                // تم تعديل الرابط هنا ليوجه لسريرفرك الخاص في Render
                const response = await fetch(`https://fares-bot-eahg.onrender.com/api/pairing?number=${number}`);
                const data = await response.json();

                if (data.status) {
                    resultDiv.innerHTML = `كودك هو: <br> <span style="color:white; background:#444; padding:5px 15px; border-radius:5px;">${data.pairing_code}</span>`;
                    Swal.fire('نجاح', 'تم توليد الكود بنجاح', 'success');
                } else {
                    resultDiv.innerHTML = "فشل توليد الكود";
                    Swal.fire('تنبيه', data.message || 'حدث خطأ ما', 'warning');
                }
            } catch (error) {
                console.error(error);
                resultDiv.innerHTML = "خطأ في الاتصال بالسيرفر";
                Swal.fire('خطأ', 'تأكد من أن السيرفر يعمل في Render', 'error');
            }
        }
    </script>
</body>
</html>
