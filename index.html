<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة فارس | Fares-Bot</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 50px; }
        .card { background: #1e1e1e; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { color: #25d366; }
        input { width: 80%; padding: 12px; margin: 20px 0; border-radius: 8px; border: none; background: #2a2a2a; color: white; text-align: center; }
        button { width: 85%; padding: 12px; background: #25d366; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #result { margin-top: 20px; font-size: 24px; color: #25d366; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Fares-Bot Pairing</h1>
        <p>أدخل الرقم مع رمز الدولة للحصول على الكود</p>
        <input type="text" id="phone" placeholder="مثال: 967770000000">
        <button onclick="getCode()">احصل على الكود</button>
        <div id="result"></div>
    </div>

    <script>
        async function getCode() {
            const num = document.getElementById('phone').value;
            const resDiv = document.getElementById('result');
            if(!num) return alert("أدخل الرقم أولاً");
            
            resDiv.innerText = "جاري التحميل...";
            try {
                const response = await fetch(`/api/pairing?number=${num}`);
                const data = await response.json();
                resDiv.innerText = data.pairing_code || "حدث خطأ!";
            } catch (e) {
                resDiv.innerText = "فشل الاتصال بالسيرفر";
            }
        }
    </script>
</body>
</html>
